<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>सुरक्षित लॉगिन | एडमिन पैनल</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="form-container" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h2>🔒 विद्यालय एडमिन लॉगिन</h2>
        {% if error %}<p style="color: red; font-weight: bold;">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="यूज़रनेम (admin)" required style="margin-bottom: 10px; padding: 10px; width: 100%;">
            <input type="password" name="password" placeholder="पासवर्ड" required style="margin-bottom: 15px; padding: 10px; width: 100%;">
            <button type="submit" class="submit-btn">प्रवेश करें</button>
        </form>
    </div>
</body>
</html>
